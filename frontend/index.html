<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/bela-turniri-symbol.svg" />
    <!-- Apple touch icon — 180x180 PNG with white padding so iOS doesn't
         clip the suits when it rounds the corners on the home screen. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#3182ce" />

    <!-- ── PWA / Add to Home Screen ─────────────────────────────────────
         Installable web app metadata. With the manifest below, Chrome
         (Android/desktop) shows an "Install app" option in the URL bar;
         Safari (iOS) supports "Add to Home Screen" via the share menu.
         The four apple-mobile-web-app-* meta tags are iOS-only, since
         iOS Safari predates and ignores parts of the W3C manifest.

         When launched from the home-screen icon the app runs in
         "standalone" mode (no Safari/Chrome chrome around the page),
         which is what makes it feel like a native app. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="application-name" content="Bela Turniri" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Bela Turniri" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="bela-turniri.com — organiziraj i prati Bela turnire. Pretraži nadolazeće turnire, pridruži se paru i prati rezultate." />

    <!-- Open Graph / link previews. og:image must be a raster format
         (PNG/JPEG) — WhatsApp and Facebook crawlers silently drop SVG
         and the share renders without a thumbnail. The 1200x1200 PNG
         is rendered from bela-turniri-symbol.svg at build time and
         checked into public/. og:image:secure_url and the explicit
         dimensions help platforms cache and lay out the card correctly.

         Per-page overrides (poster art on tournament detail, avatar on
         profile) are set client-side via useDocumentHead and take
         precedence over these defaults. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bela turniri" />
    <meta property="og:title" content="Bela turniri" />
    <meta property="og:description" content="Organiziraj i prati Bela turnire. Pretraži nadolazeće turnire, pridruži se paru i prati rezultate." />
    <meta property="og:image" content="https://bela-turniri.com/bela-turniri-symbol.png" />
    <meta property="og:image:secure_url" content="https://bela-turniri.com/bela-turniri-symbol.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="1200" />
    <meta property="og:image:alt" content="Bela turniri logo — četiri belotska adutska znaka" />
    <meta property="og:locale" content="hr_HR" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:image" content="https://bela-turniri.com/bela-turniri-symbol.png" />

    <title>Bela turniri</title>

    <!-- Reserve the vertical-scrollbar gutter unconditionally. Without this
         rule a route swap from a short page (Kalendar — fits in viewport,
         no scrollbar) to a tall page (Kreiraj turnir — scrollbar appears)
         shifts every centred element ~17px left, which the user spots as a
         jarring layout jump. `scrollbar-gutter: stable` keeps the gutter
         present always, even when content fits, so the content area's
         width is identical between routes. Falls back gracefully on older
         browsers (no jump, just the original behaviour). -->
    <style>
      html { scrollbar-gutter: stable; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
